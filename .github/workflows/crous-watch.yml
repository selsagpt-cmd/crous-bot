name: Surveillance logements CROUS

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer la vérification
        env:
          CROUS_SEARCH_URL: ${{ secrets.CROUS_SEARCH_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python crous_watcher.py

      - name: Sauvegarder l'état (seen_ids.json)
        run: |
          git config user.name "crous-bot"
          git config user.email "crous-bot@users.noreply.github.com"
          git add seen_ids.json
          git diff --quiet --cached || git commit -m "update seen_ids.json"
          git push
